<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #0e0f12; color: #f2f3f5; padding: 32px; font-size: 17px; }
        h1 { color: #e5484d; font-size: 30px; }
        .row { background: #17181c; width: 560px; padding: 14px; }
        .out { background: #30a46c; color: #0e0f12; width: 560px; padding: 14px; }
    </style>
</head>
<body>
    <h1>JavaScript from scratch</h1>
    <div class="row">The rows below were generated by JavaScript running in Zero's own interpreter.</div>
    <script>
        function fib(n) {
            if (n < 2) { return n; }
            return fib(n - 1) + fib(n - 2);
        }
        var total = 0;
        for (var i = 1; i <= 10; i++) {
            total += i;
        }
        document.write('<div class="out">fib(12) = ' + fib(12) + '</div>');
        document.write('<div class="row">sum 1..10 = ' + total + '</div>');
        var name = "Zero";
        document.write('<div class="out">' + name + ' says hello, ' + (2 + 3 * 4) + '</div>');
        console.log('script ran, total =', total);
    </script>
</body>
</html>
