<!DOCTYPE html>
<html><head><style>
body { background: #0e0f12; color: #f2f3f5; padding: 26px; font-size: 16px; }
h1 { color: #e5484d; font-size: 26px; }
h2 { color: #9a9da6; font-size: 13px; }
p { padding: 6px; }
.chip { display: inline-block; background: #30a46c; color: #06251a; padding: 8px;
        border-radius: 8px; width: 120px; }
.swatch { display: inline-block; width: 40px; height: 40px; border-radius: 8px;
          background: #66ccff; }
.swatch2 { display: inline-block; width: 40px; height: 40px; border-radius: 20px;
           background: #f5a524; }
.btn { display: inline-block; background: #e5484d; color: #fff; padding: 10px;
       border-radius: 6px; width: 150px; }
</style></head><body>
<h1>display: inline-block</h1>
<h2>Fixed-width chips flowing in a line, wrapping when the line fills</h2>
<p><span class="chip">alpha</span> <span class="chip">beta</span> <span class="chip">gamma</span> <span class="chip">delta</span> <span class="chip">epsilon</span> <span class="chip">zeta</span></p>
<h2>Sized boxes sitting inline with text</h2>
<p>Colours <span class="swatch"></span> and <span class="swatch2"></span> line up with the words around them.</p>
<h2>Buttons on one line</h2>
<p><span class="btn">Save</span> <span class="btn">Cancel</span></p>
</body></html>
