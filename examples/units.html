<html><head><style>
html { font-size: 16px; }
body { background: #0e0f12; color: #f2f3f5; padding: 1rem; font-size: 16px; }
h1 { color: #e5484d; font-size: 2em; }
.half { background: #17181c; width: 50%; padding: 1em; }
.quarter { background: #30a46c; color: #0e0f12; width: 25%; padding: 0.5em; }
.big { font-size: 1.5em; color: #66ccff; }
</style></head><body>
<h1>Relative units</h1>
<div class="half">width 50% of body, padding 1em</div>
<div class="quarter">width 25%</div>
<div class="big">font-size 1.5em inherits into this line</div>
</body></html>
